<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    body{margin-top: 7%;}
   
    label{
        margin-bottom: 1%;
    }

    h1{
        font-size: 20px;
        color: white;
        background-color: chocolate;
        text-align: center;

    }

    .informacoes{
        background-color: #e6e6e6;
        margin-left: 10%;
        margin-top: 2%;
        width: 80%;
        height: 23rem;
        display: flex;
        flex-direction: row;
        border-radius: 1rem; 
        padding-top: 1.5%;
       }

    .info-content{
        width: 100%;
        margin: 2%;
    }
    .periodo{
        display: flex;
        flex-direction: row;
    }

    .periodo input{
        margin: 1%;
        margin-top: 0%;
    }

    button{
        background-color: green;
        padding: 0.7rem;
        color: aliceblue;
        border-radius: 2rem;
        border-style: none;
        margin-top: 1.5%;
        margin-left: 82%;
    }
</style>
<body>
    <div id="secEventos" class="form-section">
        <div class="informacoes">
            <div class="info-content">
                <!-- tema -->
                <div>
                    <label for="tema">Tema do Evento</label>
                    <input type="text" class="form-control mb-2" placeholder="Inovação, segurança..." name="tema">
                </div>
                <!-- descrição -->
                <div>
                    <label for="descrição">Descrição</label>
                    <input type="text" class="form-control mb-2" placeholder="Palestra para estudantes de tecnologia ou interessados em..." name="descrição">
                </div>
                <!-- responsável -->
                <div>
                    <label for="responsavel">Responsável</label>
                    <input type="text" class="form-control mb-2" placeholder="Rodrigo Santos" name="responsavel">
                </div>
                 <!-- num vagas -->
                 <div>
                    <label for="vagas">Número de Vagas</label>
                    <input type="number" class="form-control mb-2" name="vagas">
                </div>
            </div>
            <div class="info-content">
                <!-- local -->
                 <div>
                     <label for="local">Local</label>
                     <input type="text" class="form-control mb-2" placeholder="Av. Universitária, 1500 - Mogi das Cruzes" name="local">
                 </div>
                <!-- data e hora -->
                <div>
                    <label for="data"> Data</label>
                    <input type="datetime-local" class="form-control mb-2"  name="data">
                </div>
                <!-- periodo inscrição -->
                <div>
                    <label for="periodo">Período de inscrição</label>
                    <div class="periodo">
                    <input type="date" class="form-control mb-2" name="periodo">
                    <input type="date" class="form-control mb-2" name="periodo">
                    </div>
                </div>
            </div>
        </div>
        <button type="submit" id="cadastrar-consulta">Cadastrar</button>
    </div>
</body>
</html>
