<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consulta Médica</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<style>
  body { margin-top: 6%; }
  label { margin-bottom: 1%; }
  h1 {
    font-size: 20px;
    color: white;
    background-color: chocolate;
    text-align: center;
  }
  .informacoes {
    background-color: #e6e6e6;
    margin-left: 10%;
    margin-top: 1%;
    width: 80%;
    display: flex;
    flex-direction: row;
    border-radius: 1rem;
  }
  .info-content {
    width: 100%;
    margin: 2%;
  }
  .periodo {
    display: flex;
    flex-direction: row;
  }
  .periodo input {
    margin: 1%;
    margin-top: 0%;
  }
  button {
    background-color: green;
    padding: 0.7rem;
    color: aliceblue;
    border-radius: 2rem;
    border-style: none;
    margin-top: 1%;
    margin-left: 82%;
  }
  #resultado {
    margin: 2% 10%;
  }
</style>

<body>
  <div id="secCursos" class="form-section">
    <div class="informacoes">
      <div class="info-content">
        <!-- nome curso -->
        <div>
          <label for="nome">Nome do Curso</label>
          <input type="text" class="form-control mb-2" placeholder="Fundamentos da Engenharia de Software" id="nome">
        </div>
        <!-- instrutor -->
        <div>
            <label for="instrutor">Instrutor</label>
            <input type="text" class="form-control mb-2" placeholder="Professor instrutor" id="instrutor">
        </div>
        <!-- carga horária -->
        <div>
            <label for="carga-horaria">Carga Horária</label>
            <input type="number" class="form-control mb-2" placeholder="Horário" id="carga-horaria">
        </div>
        <!-- num vagas -->
        <div>
            <label for="vagas">Número de Vagas</label>
            <input type="number" class="form-control mb-2" placeholder="Quantidade de vagas" id="vagas">
        </div>
        <!-- data inicio -->
        <div>
          <label for="data">Data de Início</label>
          <input type="date" class="form-control mb-2" id="data">
        </div>
        
      </div>
      <div class="info-content">
        
        <!-- descrição -->
        <div>
          <label for="descricao">Descrição</label>
          <input type="text" class="form-control mb-2" placeholder="carga horária..." id="descricao">
        </div>
        <!-- Pré requisitos -->
        <div>
          <label for="pre-requisitos">Pré-requisitos</label>
          <input type="text" class="form-control mb-2" placeholder="Pré-requisitos" id="pre-requisitos">
        </div>
        <!-- período inscrição -->
        <div>
          <label for="periodo">Período de inscrição</label>
          <div class="periodo">
            <input type="date" class="form-control mb-2" id="periodo1">
            <input type="date" class="form-control mb-2" id="periodo2">
          </div>
        </div>
      </div>
    </div>
    <button type="button" id="cadastrar-consulta">Cadastrar</button>
</div>

</body>
</html>
