<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    body{margin-top: 6.2%;}
   
    label{
        margin-bottom: 1%;
    }

    h1{
        font-size: 20px;
        color: white;
        background-color: chocolate;
        text-align: center;

    }

    .informacoes{
        background-color: #e6e6e6;
        margin-left: 10%;
        margin-top: 1%;
        width: 80%;
        display: flex;
        flex-direction: row;
        border-radius: 1rem; 
       }

    .info-content{
        width: 100%;
        margin: 2%;
    }
    .periodo{
        display: flex;
        flex-direction: row;
    }

    .periodo input{
        margin: 1%;
        margin-top: 0%;
    }

    button{
        background-color: green;
        padding: 0.7rem;
        color: aliceblue;
        border-radius: 2rem;
        border-style: none;
        margin-top: 1%;
        margin-left: 82%;
    }
</style>
<body>
    <div id="secConsultaVet" class="form-section">
        
        <div class="informacoes">
          <div class="info-content">
            <div>
                <label for="nome">Nome</label>
                <input type="number" class="form-control mb-2" placeholder="Castração" id="vagas">
              </div>
            <div>
              <label for="vagas">Vagas</label>
              <input type="number" class="form-control mb-2" placeholder="100" id="vagas">
            </div>
            <div>
              <label for="especialidade">Tipo de Procedimento</label>
              <input type="text" class="form-control mb-2" placeholder="cirurgico" id="especialidade">
            </div>
             <div>
              <label for="responsavel">Responsável</label>
              <input type="text" class="form-control mb-2" placeholder="Professor" id="responsavel">
            </div>
          </div>
          <div class="info-content">
           
            <div>
              <label for="descricao">Descrição</label>
              <input type="text" class="form-control mb-2" placeholder="Procesimento cirurgico para cães e gatos" id="descricao">
            </div>
            <div>
              <label for="pre-requisitos">Pré-requisitos</label>
              <input type="text" class="form-control mb-2" placeholder="Jejum de 8 à 12 horas - pré avaliação..." id="pre-requisitos">
            </div>
            <div>
              <label for="periodo">Período de inscrição</label>
              <div class="periodo">
                <input type="date" class="form-control mb-2" id="periodo1">
                <input type="date" class="form-control mb-2" id="periodo2">
              </div>
            </div>
          </div>
        </div>
        <button type="button" id="cadastrar-consulta">Cadastrar</button>
    </div>
</body>
</html>
