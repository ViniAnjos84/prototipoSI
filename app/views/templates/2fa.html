<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Verificação</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/2fa.css') }}">
</head>

<body>
    <div class="container">
        <h2>Verificação</h2>
        <p>Digite o código de 6 dígitos enviado para seu email</p>

        <form method="POST" action="{{ url_for('auth.verificar_2fa') }}">
            
            <div class="code-inputs">
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
            </div>

            <!-- Campo oculto que junta tudo -->
            <input type="hidden" name="codigo" id="codigoCompleto">

            <button type="submit">Confirmar</button>
        </form>

        <div class="resend">
            Não recebeu? <a href="#">Reenviar código</a>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll(".code-inputs input");
        const hiddenInput = document.getElementById("codigoCompleto");

        inputs.forEach((input, index) => {
            input.addEventListener("input", () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                atualizarCodigo();
            });

            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function atualizarCodigo() {
            let codigo = "";
            inputs.forEach(input => {
                codigo += input.value;
            });
            hiddenInput.value = codigo;
        }
    </script>
</body>
</html>
