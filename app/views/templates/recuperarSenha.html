<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/loginCadastroStyle.css') }}">
</head>
<body>

    <form class="formulario-container-login" method="POST" action="{{ url_for('auth.recuperar_senha') }}">

        <div class="info-form">

            <h1>Recuperar Senha</h1>

            <p class="subtitulo-recuperacao">
                Informe seu email para receber o código de recuperação.
            </p>

            <!-- Mensagem -->
            {% if mensagem %}
                <div class="mensagem {{ tipo }}">
                    {{ mensagem }}
                </div>
            {% endif %}

            <div class="mb-4">
                <label for="email" class="form-label">Email</label>

                <input 
                    type="email" 
                    class="form-control" 
                    id="email"
                    name="email"
                    placeholder="Digite seu email"
                    required>
            </div>

            <button type="submit" class="btn-login">
                Enviar Código
            </button>

            <a href="{{ url_for('auth.login') }}">
                Voltar para login
            </a>

        </div>

        <div class="imagem">
            <img src="https://img.freepik.com/free-vector/password-concept-illustration_114360-7562.jpg" alt="Recuperação de senha">
        </div>

    </form>

</body>
</html>
