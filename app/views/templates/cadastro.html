<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loginCadastroStyle.css') }}">
  </head>
  <body>

<!-- #mensagem de sucesso ou erro no cadastro -->
    {% if mensagem %}
  <div class="alert 
    {% if tipo == 'sucesso' %}alert-success
    {% elif tipo == 'erro' %}alert-danger
    {% endif %}">
    {{ mensagem }}
  </div>
{% endif %}

    <form class="formulario-container" method="POST" action="/cadastrar">
      <div class="formulario-infos">

        <!-- COLUNA 1 -->
        <div class="info-form">
          <h1>Cadastro</h1>

          <div class="mb-3">
            <label class="form-label">Nome Completo</label>
            <input type="text" name="nome" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="tel" name="telefone" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">CEP</label>
            <input type="text" name="cep" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Número</label>
            <input type="text" name="numero" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Complemento</label>
            <input type="text" name="complemento" class="form-control" />
          </div>
        </div>

        <!-- COLUNA 2 -->
        <div class="info-form" style="margin-top: 5.2%">

          <div class="mb-3">
            <label class="form-label">CPF</label>
            <input type="text" name="cpf" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">RG</label>
            <input type="text" name="rg" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="senha" class="form-control" required />
          </div>

          <div class="mb-3" id="termos-uso">
            <div>
              <a href="#">Ler termos de uso</a>
            </div>
            <input type="checkbox" name="termos" class="form-check-input" required />
            <label class="form-check-label">Aceito os termos</label>
          </div>

        </div>

        <!-- COLUNA 3 -->
        <div class="info-form" style="margin-top: 5%">

          <div class="mb-3">
            <label class="form-label">Deseja cadastrar:</label>
            <select
              name="tipoCadastro"
              class="form-select"
              id="tipoCadastro"
              onchange="mostrarFormulario()"
            >
              <option value="">Selecione</option>
              <option value="dependente">Dependente</option>
              <option value="pet">Pet</option>
            </select>
          </div>

          <!-- DEPENDENTE -->
          <div id="formDependente" style="display: none">
            <div class="mb-3">
              <label class="form-label">Nome do Dependente</label>
              <input type="text" name="nome_dependente" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Data de Nascimento</label>
              <input type="date" name="data_nascimento" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Parentesco</label>
              <input type="text" name="parentesco" class="form-control" />
            </div>
          </div>

          <!-- PET -->
          <div id="formPet" style="display: none">
            <div class="mb-3">
              <label class="form-label">Nome do Pet</label>
              <input type="text" name="nome_pet" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Espécie</label>
              <input type="text" name="especie" class="form-control" />
            </div>

            <div class="mb-3">
              <label class="form-label">Raça</label>
              <input type="text" name="raca" class="form-control" />
            </div>
          </div>

        </div>

        <!-- IMAGEM -->
        <div class="info-form" style="width: 5%;">
          <img src="https://img.freepik.com/vetores-gratis/ilustracao-do-conceito-de-politica-de-privacidade_114360-7853.jpg" class="imagem-cad">
        </div>

      </div>

      <!-- BOTÕES -->
      <div class="formulario-buttons">
        <button type="submit" class="btn btn-primary" style="width: 63%;">Cadastrar</button>
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Voltar</a>
      </div>

    </form>

    <script>
      function mostrarFormulario() {
        const tipo = document.getElementById("tipoCadastro").value;
        document.getElementById("formDependente").style.display =
          tipo === "dependente" ? "block" : "none";
        document.getElementById("formPet").style.display =
          tipo === "pet" ? "block" : "none";
      }
    </script>

  </body>
</html>
