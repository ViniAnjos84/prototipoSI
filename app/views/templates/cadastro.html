<!DOCTYPE html>

    <meta charset="UTF-8" />

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css"
      rel="stylesheet"

<script>
document.addEventListener("DOMContentLoaded", function () {

  // ✅ VALIDAÇÃO DE SENHA
  document.querySelector("form").addEventListener("submit", function (e) {
    const senha = document.getElementById("senha").value;
    const confirmar = document.getElementById("senhaVER").value;

    if (senha !== confirmar) {
      e.preventDefault();
      alert("As senhas não coincidem!");
    }
  });

  // ✅ MÁSCARA TELEFONE
  document.getElementById("telefone").addEventListener("input", function (e) {
    let v = e.target.value.replace(/\D/g, "");

    if (v.length > 11) v = v.slice(0, 11);

    if (v.length > 6) {
      v = v.replace(/(\d{2})(\d{5})(\d+)/, "($1) $2-$3");
    } else if (v.length > 2) {
      v = v.replace(/(\d{2})(\d+)/, "($1) $2");
    }

    e.target.value = v;
  });

  // ✅ MÁSCARA CPF
  document.getElementById("cpf").addEventListener("input", function (e) {
    let v = e.target.value.replace(/\D/g, "");

    if (v.length > 11) v = v.slice(0, 11);

    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

    e.target.value = v;
  });

  // ✅ MÁSCARA RG
  document.getElementById("rg").addEventListener("input", function (e) {
    let v = e.target.value.replace(/\D/g, "");

    if (v.length > 9) v = v.slice(0, 9);

    v = v.replace(/(\d{2})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d)/, "$1.$2");
    v = v.replace(/(\d{3})(\d{1})$/, "$1-$2");

    e.target.value = v;
  });

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toastEl = document.getElementById("toastMsg");

  if (toastEl) {
    const toast = new bootstrap.Toast(toastEl, {
      delay: 4000
    });
    toast.show();
  }
});
</script>
<body>

<!-- #mensagem de sucesso ou erro no cadastro -->
{% if mensagem %}
<div class="position-fixed top-50 start-50 translate-middle" style="z-index: 11">

  {% if tipo == 'sucesso' %}
  <div id="toastMsg" class="toast align-items-center text-bg-success border-0 text-center" role="alert">
    <div class="d-flex flex-column align-items-center p-3">
      <strong class="mb-2">Sucesso</strong>
      <div class="toast-body">
        <p>Cadastrado com Sucesso :)</p>
      </div>
      <button type="button" class="btn-close btn-close-white mt-2" data-bs-dismiss="toast"></button>
    </div>
  </div>
  {% endif %}

  {% if tipo == 'erro' %}
  <div id="toastMsg" class="toast align-items-center text-bg-danger border-0 text-center" role="alert">
    <div class="d-flex flex-column align-items-center p-3">
      <strong class="mb-2">Erro</strong>
      <div class="toast-body">
        <p>Não foi possível realizar o cadastro, por favor, verifique suas informações :(</p>
      </div>
      <button type="button" class="btn-close btn-close-white mt-2" data-bs-dismiss="toast"></button>
    </div>
  </div>
  {% endif %}

</div>
{% endif %}
