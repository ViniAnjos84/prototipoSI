<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações de Acessibilidade</title>
  <style>
    :root {
      --fonte-padrao: 16px;
      --cor-fundo: #ffffff;
      --cor-texto: #000000;
      --cor-primaria: #345CFC;
      --cor-primaria-hover: #2749c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: var(--fonte-padrao);
      background-color: var(--cor-fundo);
      color: var(--cor-texto);
      margin-top: 8rem;
      padding: 0;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      max-width: 600px;
      margin: 3rem auto;
      background-color: #f9f9f9;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.8rem;
    }

    .configuracao {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .botoes-usuario {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn-ajuda, .btn-voltar-a {
      flex: 1;
      background-color: var(--cor-primaria);
      color: white;
      border: none;
      padding: 0.7rem;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-ajuda:hover, .btn-voltar-a:hover {
      background-color: var(--cor-primaria-hover);
    }

    .modo-contraste {
      background-color: #000 !important;
      color: #FFF !important;
    }
  </style>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
      <link rel="stylesheet" href="{{ url_for('static', filename='css/userStyle.css') }}">

</head>
<body>
   <nav class="navbar bg-primary-subtle fixed-top">
        <div class="container-fluid">

          <a class="navbar-brand text-primary-emphasis" href="{{ url_for('main.indexUsers') }}">SAEC</a>

          <button class="navbar-toggler bg-primary-subtle rounded-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="offcanvas offcanvas-end" id="offcanvasNavbar">
            
            <div class="offcanvas-header">
              <h5 class="offcanvas-title">Menu</h5>
              <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>

            <div class="offcanvas-body">

              <!-- 👤 Usuário -->
              <h6>Olá, {{ session['usuario_nome'] }} 👋</h6>

              <ul class="navbar-nav">

                <li class="nav-item">
                  <a class="nav-link" href="#">Notificações</a>
                </li>

                <li class="nav-item">
                  <a class="nav-link" href="#">Configurações</a>
                </li>

                <li class="nav-item dropdown">
                  <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                    Cadastrar Novo Dependente
                  </a>

                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Menor de Idade</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#">Pet</a></li>
                  </ul>
                </li>

              </ul>

              <!-- 🚪 Logout -->
              <div class="btn-sair mt-3">
                <a href="{{ url_for('auth.logout') }}">Sair</a>
              </div>

            </div>
          </div>
        </div>
    </nav>
  <div class="container">
    <h1>Configurações de Acessibilidade</h1>

    <div class="configuracao">
      <label for="modo">Modo:</label>
      <select id="modo" onchange="alterarModo()">
        <option value="padrao">Padrão</option>
        <option value="alto-contraste">Alto Contraste</option>
      </select>
    </div>

    <div class="configuracao">
      <label for="fonte">Tamanho da Fonte:</label>
      <select id="fonte" onchange="alterarFonte()">
        <option value="16px">Normal</option>
        <option value="18px">Médio</option>
        <option value="20px">Grande</option>
        <option value="24px">Muito Grande</option>
      </select>
    </div>

    <div class="botoes-usuario">
      <button class="btn-ajuda" onclick="mostrarAjuda()">Ajuda</button>
      <button class="btn-ajuda" onclick="restaurarPadrao()">Restaurar Padrão</button>
      <a class="btn-voltar-a" href="{{ url_for('main.indexUsers') }}">Voltar</a>
    </div>
  </div>
</body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</html>
