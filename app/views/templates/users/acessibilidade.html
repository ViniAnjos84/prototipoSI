<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações de Acessibilidade</title>
  <style>
    :root {
      --fonte-padrao: 16px;
      --cor-fundo: #ffffff;
      --cor-texto: #000000;
      --cor-primaria: #345CFC;
      --cor-primaria-hover: #2749c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: var(--fonte-padrao);
      background-color: var(--cor-fundo);
      color: var(--cor-texto);
      margin-top: 8rem;
      padding: 0;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      max-width: 600px;
      margin: 3rem auto;
      background-color: #f9f9f9;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.8rem;
    }

    .configuracao {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .botoes-usuario {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn-ajuda, .btn-voltar-a {
      flex: 1;
      background-color: var(--cor-primaria);
      color: white;
      border: none;
      padding: 0.7rem;
      border-radius: 8px;
      text-align: center;
      text-decoration: none;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-ajuda:hover, .btn-voltar-a:hover {
      background-color: var(--cor-primaria-hover);
    }

    .modo-contraste {
      background-color: #000 !important;
      color: #FFF !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Configurações de Acessibilidade</h1>

    <div class="configuracao">
      <label for="modo">Modo:</label>
      <select id="modo" onchange="alterarModo()">
        <option value="padrao">Padrão</option>
        <option value="alto-contraste">Alto Contraste</option>
      </select>
    </div>

    <div class="configuracao">
      <label for="fonte">Tamanho da Fonte:</label>
      <select id="fonte" onchange="alterarFonte()">
        <option value="16px">Normal</option>
        <option value="18px">Médio</option>
        <option value="20px">Grande</option>
        <option value="24px">Muito Grande</option>
      </select>
    </div>

    <div class="botoes-usuario">
      <button class="btn-ajuda" onclick="mostrarAjuda()">Ajuda</button>
      <button class="btn-ajuda" onclick="restaurarPadrao()">Restaurar Padrão</button>
      <a class="btn-voltar-a" href="./indexUsers.html" style="padding-top: 6%;">Voltar</a>
    </div>
  </div>
</body>
</html>
