<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Código</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/verificarCodigoStyle.css') }}">
</head>

<body>

    <form class="formulario-container-login"
          method="POST"
          action="{{ url_for('auth.validar_codigo_recuperacao') }}">

        <div class="info-form">

            <h1>Verificação</h1>

            <p class="subtitulo-verificacao">
                Digite o código de 6 dígitos enviado para seu email
            </p>

            {% if mensagem %}
                <div class="mensagem {{ tipo }}">
                    {{ mensagem }}
                </div>
            {% endif %}

            <div class="code-inputs">
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
                <input type="text" maxlength="1" required>
            </div>

            <!-- valor real enviado -->
            <input type="hidden" name="codigo" id="codigoCompleto">

            <button type="submit" class="btn-login">
                Confirmar Código
            </button>

            <div class="reenviar-codigo">
                Não recebeu? 
                <a href="{{ url_for('auth.validar_codigo_recuperacao') }}">
                    Reenviar código
                </a>
            </div>

            <div class="voltar-login">
                <a href="{{ url_for('auth.login') }}">
                    Voltar para login
                </a>
            </div>

        </div>

        <div class="imagem">
            <img src="https://img.freepik.com/free-vector/security-concept-illustration_114360-2294.jpg" alt="Verificação">
        </div>

    </form>


    <script>
        const inputs = document.querySelectorAll(".code-inputs input");
        const hiddenInput = document.getElementById("codigoCompleto");

        inputs.forEach((input, index) => {

            input.addEventListener("input", () => {

                // aceita apenas números
                input.value = input.value.replace(/\D/g, "");

                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }

                atualizarCodigo();
            });

            input.addEventListener("keydown", (e) => {

                if (e.key === "Backspace" && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }

            });

        });

        function atualizarCodigo() {
            let codigo = "";

            inputs.forEach(input => {
                codigo += input.value;
            });

            hiddenInput.value = codigo;
        }

    </script>

</body>
</html>
